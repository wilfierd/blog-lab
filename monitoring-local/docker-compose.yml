version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-local
    restart: unless-stopped
    env_file: ../.env
    entrypoint:
      - sh
      - -c
      - |
        envsubst < /etc/prometheus/prometheus.yml.template > /etc/prometheus/prometheus.yml
        exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --web.enable-lifecycle
    volumes:
      - ./prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-rules.yml:/etc/prometheus/rules/prometheus-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:2.9.9
    container_name: loki-local
    restart: unless-stopped
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.9
    container_name: promtail-local
    user: "0:0"
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-local
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-local
    restart: unless-stopped
    ports:
      - "9101:9100"

  blog-app:
    image: fedora:latest
    container_name: blog-app-local
    restart: unless-stopped
    working_dir: /app
    command: bash -c "mkdir -p /app/logs && ./blog-app-bin 2>&1 | tee /app/logs/blog-app.log"
    environment:
      - DB_HOST=host.containers.internal
      - DB_PORT=5432
      - DB_USER=admins
      - DB_PASSWORD=secretpassword
      - DB_NAME=blogdb
      - DB_SSLMODE=disable
      - REDIS_ADDR=host.containers.internal:6379
      - SESSION_SECRET=supersecretrandomstring
      - GOOGLE_REDIRECT_URL=http://localhost:8080/auth/google/callback
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
    volumes:
      - ..:/app
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      - prometheus

  alertmanager:
    image: docker.io/prom/alertmanager:latest
    container_name: alertmanager-local
    restart: unless-stopped
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

  cloudwatch-exporter:
    image: prom/cloudwatch-exporter:latest
    container_name: cloudwatch-exporter-local
    restart: unless-stopped
    env_file: ../.env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./cloudwatch-config.yml:/config/config.yml:ro
    ports:
      - "9106:9106"
    environment:
      - AWS_DEFAULT_REGION=us-west-2

volumes:
  prometheus_data:
  grafana_data:
