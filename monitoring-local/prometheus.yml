global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus-self'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'local-infrastructure'
    static_configs:
      - targets: ['node-exporter:9100']

  # Mẫu để sau này kéo metrics từ EC2 (Bạn chỉ cần đổi IP sau)
  - job_name: 'ec2-infrastructure'
    static_configs:
      - targets: ['<YOUR_EC2_PUBLIC_IP>:9100']

  - job_name: 'ec2-go-app'
    static_configs:
      - targets: ['<YOUR_EC2_PUBLIC_IP>:8080']
