global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # System metrics from this machine
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter-local:9100']

  # Blog app — runs as container in same network
  - job_name: 'blog-app-local'
    static_configs:
      - targets: ['blog-app-local:8080']
    metrics_path: /metrics

  # ── AWS — Blog app qua ALB (public) ────────────────────────────────────────
  # - job_name: 'blog-app-ec2'
