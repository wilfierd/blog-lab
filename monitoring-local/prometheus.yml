global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter-local:9100']

  # ── AWS — Blog app scrape trực tiếp từng EC2 qua Tailscale ─────────────────
  - job_name: 'blog-app-ec2'
    static_configs:
      - targets: ['100.97.11.126:8080']
    metrics_path: /metrics
    scheme: http

  # ── AWS — CloudWatch (RDS, Redis, ALB, EC2/ASG) ─────────────────────────────
  - job_name: 'cloudwatch'
    scrape_interval: 60s
    scrape_timeout: 55s
    honor_timestamps: false
    static_configs:
      - targets: ['cloudwatch-exporter-local:9106']
    metrics_path: /metrics
