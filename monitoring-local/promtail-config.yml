server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki-local:3100/loki/api/v1/push

scrape_configs:
  # System logs
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          host: local
          __path__: /var/log/syslog

  # Blog app log (stdout redirected to file)
  - job_name: blog-app
    static_configs:
      - targets: [localhost]
        labels:
          job: blog-app
          host: local
          __path__: /app/logs/blog-app.log

  # Journal logs (systemd — works on Amazon Linux 2023)
  - job_name: journal
    journal:
      max_age: 12h
      labels:
        job: systemd-journal
    relabel_configs:
      - source_labels: [__journal__systemd_unit]
        target_label: unit
