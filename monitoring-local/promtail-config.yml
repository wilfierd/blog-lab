server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki-local:3100/loki/api/v1/push

scrape_configs:
  # System logs (Fedora: /var/log/messages — cần chmod 644)
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          service_name: syslog
          host: local
          __path__: /var/log/messages

  # Blog app log (stdout redirected to file)
  - job_name: blog-app
    static_configs:
      - targets: [localhost]
        labels:
          job: blog-app
          service_name: blog-app
          host: local
          __path__: /app/logs/blog-app.log
