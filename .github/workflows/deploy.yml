name: Deploy Blog App to EC2 (Private Subnet)

on:
  push:
    branches:
      - main

# ============================================================
# Job 1: Build   → Build binary Go (ARM64)
# Job 2: Deploy  → Upload S3, SSM deploy lên EC2
# Job 3: Verify  → Health check + rollback nếu fail
# ============================================================

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: BUILD
  # ──────────────────────────────────────────────
  build:
    name: Build Go Binary
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build for ARM64 (Graviton)
      run: |
        echo "Building Go backend for ARM64..."
        GOOS=linux GOARCH=arm64 go build -o blog-app .
        ls -lh blog-app

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload Artifacts to S3
      env:
        BUCKET: ${{ secrets.AWS_BUCKET_NAME }}
        REGION: ${{ secrets.AWS_REGION }}
      run: |
        BUCKET=$(echo "$BUCKET" | tr -d '[:space:]')
        REGION=$(echo "$REGION" | tr -d '[:space:]')
        echo "Uploading to s3://${BUCKET}/..."
        aws s3 cp blog-app "s3://${BUCKET}/blog-app" --region "${REGION}"
        aws s3 cp blog.service "s3://${BUCKET}/blog.service" --region "${REGION}"
        aws s3 sync frontend/ "s3://${BUCKET}/frontend/" --region "${REGION}" --delete
        echo "Upload completed"

  # ──────────────────────────────────────────────
  # JOB 2: DEPLOY (Using Ansible)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to ASG via Ansible
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Ansible and dependencies
      run: |
        pip install -r ansible/requirements.txt
        
        # Install AWS Session Manager plugin for SSH over SSM
        curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
        sudo dpkg -i session-manager-plugin.deb

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Install Ansible Collections
      run: |
        ansible-galaxy collection install -r ansible/requirements.yml

    - name: Run Ansible Playbook
      env:
        AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        ANSIBLE_HOST_KEY_CHECKING: "False"
      run: |
        cd ansible
        ansible-playbook playbooks/deploy.yml

  # ──────────────────────────────────────────────
  # JOB 3: VERIFY
  # ──────────────────────────────────────────────
  verify:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Get ALB DNS
      id: get_alb
      run: |
        # Get ALB DNS from tag or output (adjust based on your setup)
        ALB_DNS=$(aws elbv2 describe-load-balancers \
          --names blog-alb \
          --query 'LoadBalancers[0].DNSName' \
          --output text)
        
        echo "ALB DNS: $ALB_DNS"
        echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT

    - name: Health Check via ALB
      env:
        ALB_DNS: ${{ steps.get_alb.outputs.alb_dns }}
      run: |
        echo "Running health check via ALB..."
        
        for i in {1..10}; do
          if curl -sf "http://${ALB_DNS}/api/health" > /dev/null; then
            echo "✅ Health check passed (attempt $i)"
            exit 0
          fi
          echo "Attempt $i failed, retrying..."
          sleep 5
        done
        
        echo "::error::Health check failed after 10 attempts"
        exit 1

    - name: Deployment Success
      run: echo "✅ Deployment completed successfully!"
