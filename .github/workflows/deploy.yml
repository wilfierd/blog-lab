name: Deploy Blog App to EC2 (Private Subnet)

on:
  push:
    branches:
      - main # Chạy pipeline khi có code mới đẩy lên nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22' # Thay đổi phiên bản Go nếu cần

    - name: Build Go Backend for ARM64 (Graviton)
      run: |
        echo "Building Go backend..."
        GOOS=linux GOARCH=arm64 go build -o blog-app .

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload Binary to S3
      env:
        BUCKET: ${{ secrets.AWS_BUCKET_NAME }}
        REGION: ${{ secrets.AWS_REGION }}
      run: |
        echo "Uploading backend binary to S3..."
        BUCKET=$(echo "$BUCKET" | tr -d '[:space:]')
        REGION=$(echo "$REGION" | tr -d '[:space:]')
        aws s3 cp blog-app "s3://${BUCKET}/blog-app" --region "${REGION}"
        echo "Upload completed"

    - name: Deploy to EC2 via AWS Systems Manager (SSM)
      env:
        BUCKET: ${{ secrets.AWS_BUCKET_NAME }}
        REGION: ${{ secrets.AWS_REGION }}
        INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      run: |
        echo "Sending deployment command to EC2 instance..."

        # Backup binary cũ trước khi deploy
        BACKUP_COMMAND_ID=$(aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["cd /home/ec2-user && if [ -f blog-app ]; then cp blog-app blog-app.backup; fi"]' \
          --query 'Command.CommandId' \
          --output text)

        aws ssm wait command-executed \
          --command-id "$BACKUP_COMMAND_ID" \
          --instance-id "$INSTANCE_ID"

        # Deploy binary mới - gộp thành 1 lệnh duy nhất để tránh lỗi quoting
        DEPLOY_CMD="cd /home/ec2-user && aws s3 cp s3://${BUCKET}/blog-app . --region ${REGION} && chmod +x blog-app && sudo systemctl restart blog.service"

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "commands=[\"$DEPLOY_CMD\"]" \
          --query 'Command.CommandId' \
          --output text)

        echo "Command ID: $COMMAND_ID"

        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID"

        aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID" \
          --query 'StandardOutputContent' \
          --output text

    - name: Health Check
      env:
        INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      run: |
        echo "Running health check..."

        HEALTH_CMD="for i in {1..10}; do if curl -sf http://localhost:8080/api/health > /dev/null; then echo 'Health check passed'; exit 0; fi; echo \"Attempt $i failed, retrying...\"; sleep 3; done; echo 'Health check failed after 10 attempts'; exit 1"

        HEALTH_CHECK_ID=$(aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "commands=[\"$HEALTH_CMD\"]" \
          --query 'Command.CommandId' \
          --output text)

        aws ssm wait command-executed \
          --command-id "$HEALTH_CHECK_ID" \
          --instance-id "$INSTANCE_ID"

        STATUS=$(aws ssm get-command-invocation \
          --command-id "$HEALTH_CHECK_ID" \
          --instance-id "$INSTANCE_ID" \
          --query 'Status' \
          --output text)

        if [ "$STATUS" != "Success" ]; then
          echo "Health check failed! Rolling back..."

          ROLLBACK_CMD="cd /home/ec2-user && if [ -f blog-app.backup ]; then mv blog-app.backup blog-app && sudo systemctl restart blog.service && echo 'Rolled back to previous version'; else echo 'No backup found'; fi"

          ROLLBACK_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"$ROLLBACK_CMD\"]" \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed \
            --command-id "$ROLLBACK_ID" \
            --instance-id "$INSTANCE_ID"

          exit 1
        fi

        echo "Deployment successful!"
