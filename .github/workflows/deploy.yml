name: Deploy Blog App to EC2 (Private Subnet)

on:
  push:
    branches:
      - main # Chạy pipeline khi có code mới đẩy lên nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22' # Thay đổi phiên bản Go nếu cần

    - name: Build Go Backend for ARM64 (Graviton)
      run: |
        echo "Building Go backend..."
        GOOS=linux GOARCH=arm64 go build -o blog-app .

    - name: Zip Frontend files
      run: |
        echo "Zipping frontend folder..."
        zip -r frontend.zip frontend/

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }} # ví dụ: us-west-2

    - name: Upload Artifacts to S3
      run: |
        echo "Uploading files to S3 bucket..."
        aws s3 cp blog-app s3://${{ secrets.AWS_BUCKET_NAME }}/blog-app
        aws s3 cp frontend.zip s3://${{ secrets.AWS_BUCKET_NAME }}/frontend.zip

    - name: Deploy to EC2 via AWS Systems Manager (SSM)
      run: |
        echo "Sending deployment command to EC2 instance..."
        
        # Backup binary cũ trước khi deploy
        BACKUP_COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "cd /home/ec2-user",
            "if [ -f blog-app ]; then cp blog-app blog-app.backup; fi"
          ]' \
          --query "Command.CommandId" \
          --output text)
        
        aws ssm wait command-executed \
          --command-id "$BACKUP_COMMAND_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}"
        
        # Deploy binary mới
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "cd /home/ec2-user",
            "aws s3 cp s3://${{ secrets.AWS_BUCKET_NAME }}/blog-app . --region ${{ secrets.AWS_REGION }}",
            "aws s3 cp s3://${{ secrets.AWS_BUCKET_NAME }}/frontend.zip . --region ${{ secrets.AWS_REGION }}",
            "unzip -o frontend.zip",
            "chmod +x blog-app",
            "sudo systemctl restart blog.service",
            "sleep 5"
          ]' \
          --query "Command.CommandId" \
          --output text)

        echo "Command ID: $COMMAND_ID"
        
        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

        aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
          --query "StandardOutputContent" \
          --output text

    - name: Health Check
      run: |
        echo "Running health check..."
        HEALTH_CHECK_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "for i in {1..10}; do",
            "  if curl -f http://localhost:8080/api/health > /dev/null 2>&1; then",
            "    echo \"Health check passed\"",
            "    exit 0",
            "  fi",
            "  echo \"Attempt $i failed, retrying...\"",
            "  sleep 3",
            "done",
            "echo \"Health check failed after 10 attempts\"",
            "exit 1"
          ]' \
          --query "Command.CommandId" \
          --output text)
        
        aws ssm wait command-executed \
          --command-id "$HEALTH_CHECK_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}"
        
        STATUS=$(aws ssm get-command-invocation \
          --command-id "$HEALTH_CHECK_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
          --query "Status" \
          --output text)
        
        if [ "$STATUS" != "Success" ]; then
          echo "Health check failed! Rolling back..."
          
          # Rollback to previous version
          ROLLBACK_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ec2-user",
              "if [ -f blog-app.backup ]; then",
              "  mv blog-app.backup blog-app",
              "  sudo systemctl restart blog.service",
              "  echo \"Rolled back to previous version\"",
              "else",
              "  echo \"No backup found\"",
              "fi"
            ]' \
            --query "Command.CommandId" \
            --output text)
          
          aws ssm wait command-executed \
            --command-id "$ROLLBACK_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"
          
          exit 1
        fi
        
        echo "Deployment successful!"
