name: Deploy Blog App to EC2 (Private Subnet)

on:
  push:
    branches:
      - main

# ============================================================
# Job 1: Build   → Build binary Go (ARM64), upload S3
# Job 2: Deploy  → Rolling deploy lên EC2 qua Ansible + SSM
#                  (Ansible tự verify + rollback nếu fail)
# ============================================================

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: BUILD
  # ──────────────────────────────────────────────
  build:
    name: Build Go Binary
    runs-on: ubuntu-latest

    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build for ARM64 (Graviton)
      run: |
        GOOS=linux GOARCH=arm64 go build -o blog-app .
        ls -lh blog-app

    - name: Set metadata
      id: meta
      run: echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload Artifacts to S3
      env:
        BUCKET: ${{ secrets.AWS_BUCKET_NAME }}
        REGION: ${{ secrets.AWS_REGION }}
        SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
      run: |
        BUCKET=$(echo "$BUCKET" | tr -d '[:space:]')
        REGION=$(echo "$REGION" | tr -d '[:space:]')
        # latest — dùng cho deploy bình thường
        aws s3 cp blog-app    "s3://${BUCKET}/blog-app"                           --region "${REGION}"
        aws s3 cp blog.service "s3://${BUCKET}/blog.service"                      --region "${REGION}"
        aws s3 sync frontend/ "s3://${BUCKET}/frontend/" --delete                 --region "${REGION}"
        # versioned — dùng cho rollback fallback
        aws s3 cp blog-app    "s3://${BUCKET}/releases/blog-app-${SHORT_SHA}"     --region "${REGION}"

  # ──────────────────────────────────────────────
  # JOB 2: DEPLOY
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to ASG via Ansible
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Ansible
      uses: ./.github/actions/ansible-setup

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Run Ansible Deploy
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
      run: |
        BUCKET=$(echo "${{ secrets.AWS_BUCKET_NAME }}" | tr -d '[:space:]')
        REGION=$(echo "${{ secrets.AWS_REGION }}" | tr -d '[:space:]')
        cd ansible
        ansible-playbook playbooks/deploy.yml \
          -e "bucket=${BUCKET}" \
          -e "region=${REGION}" \
          -e "binary_version=${{ needs.build.outputs.short_sha }}"
