name: Deploy Blog App to EC2 (Private Subnet)

on:
  push:
    branches:
      - main # Chạy pipeline khi có code mới đẩy lên nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22' # Thay đổi phiên bản Go nếu cần

    - name: Build Go Backend for ARM64 (Graviton)
      run: |
        echo "Building Go backend..."
        GOOS=linux GOARCH=arm64 go build -o blog-app .

    - name: Zip Frontend files
      run: |
        echo "Zipping frontend folder..."
        zip -r frontend.zip frontend/

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }} # ví dụ: us-west-2

    - name: Upload Artifacts to S3
      run: |
        echo "Uploading files to S3 bucket..."
        aws s3 cp blog-app s3://${{ secrets.AWS_BUCKET_NAME }}/deploy/blog-app
        aws s3 cp frontend.zip s3://${{ secrets.AWS_BUCKET_NAME }}/deploy/frontend.zip

    - name: Deploy to EC2 via AWS Systems Manager (SSM)
      run: |
        echo "Sending deployment command to EC2 instance..."
        # Lệnh này yêu cầu EC2 tải code mới từ S3 về và khởi động lại dịch vụ
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "cd /home/ec2-user",
            "aws s3 cp s3://${{ secrets.AWS_BUCKET_NAME }}/deploy/blog-app .",
            "aws s3 cp s3://${{ secrets.AWS_BUCKET_NAME }}/deploy/frontend.zip .",
            "unzip -o frontend.zip",
            "chmod +x blog-app",
            "sudo systemctl daemon-reload",
            "sudo systemctl restart blog.service",
            "sudo systemctl status blog.service --no-pager"
          ]' \
          --query "Command.CommandId" \
          --output text)

        echo "Command ID: $COMMAND_ID"
        
        # Chờ lệnh chạy xong và kiểm tra kết quả (Tối đa 60 giây)
        echo "Waiting for command to complete..."
        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

        # Lấy output log của lệnh vừa chạy trên EC2
        aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
          --query "StandardOutputContent" \
          --output text
