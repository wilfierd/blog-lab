name: Deploy Blog App to Kubernetes (On-Prem)

on:
  push:
    branches:
      - main

# ============================================================
# Yêu cầu: self-hosted runner cài trên máy local/VM
# vì K8s cluster dùng private IP 192.168.122.x
# GitHub cloud runner không reach được private network
#
# Cài runner: GitHub repo → Settings → Actions → Runners → New self-hosted runner
#
# Job 1: Build  → Build Docker image amd64, push Docker Hub
# Job 2: Deploy → Ansible SSH vào master, helm upgrade
# ============================================================

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: self-hosted

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/blog-app:${{ steps.meta.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/blog-app:latest

  deploy:
    name: Deploy to K8s via Ansible
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create secrets-values.yaml
        run: |
          cat > helm/blog-app/secrets-values.yaml << EOF
          secrets:
            dbPassword: "${{ secrets.DB_PASSWORD }}"
            sessionSecret: "${{ secrets.SESSION_SECRET }}"
            googleClientID: "${{ secrets.GOOGLE_CLIENT_ID }}"
            googleClientSecret: "${{ secrets.GOOGLE_CLIENT_SECRET }}"
            minioAccessKey: "${{ secrets.MINIO_ACCESS_KEY }}"
            minioSecretKey: "${{ secrets.MINIO_SECRET_KEY }}"
          EOF

      - name: Install Ansible Collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Ansible helm upgrade blog-app
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook ansible/playbooks/k8s-deploy.yml \
            -i ansible/inventory/k8s_hosts.ini \
            -e "image_tag=${{ needs.build-and-push.outputs.image_tag }}" \
            -e "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}"
