name: Deploy Blog App to Kubernetes

on:
  push:
    branches:
      - main

env:
  MASTER_USER: devops
  MASTER_IP: 192.168.122.111
  KUBECONFIG_PATH: /home/devops/.kube/config
  NAMESPACE: blog
  APP_NAME: blog-app
  HELM_REMOTE_PATH: /tmp/helm/blog-app
  SECRETS_LOCAL_PATH: $HOME/secrets/blog-secrets-values.yaml

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & Push image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}
          TAG=${{ steps.meta.outputs.image_tag }}
          podman build --platform linux/amd64 -t $IMAGE:$TAG -t $IMAGE:latest .
          podman login docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          podman push $IMAGE:$TAG
          podman push $IMAGE:latest

  deploy:
    name: Deploy to K8s
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy helm chart + secrets lên master
        run: |
          ssh ${{ env.MASTER_USER }}@${{ env.MASTER_IP }} "mkdir -p ${{ env.HELM_REMOTE_PATH }}"
          rsync -az helm/blog-app/ ${{ env.MASTER_USER }}@${{ env.MASTER_IP }}:${{ env.HELM_REMOTE_PATH }}/
          rsync -az ${{ env.SECRETS_LOCAL_PATH }} ${{ env.MASTER_USER }}@${{ env.MASTER_IP }}:${{ env.HELM_REMOTE_PATH }}/secrets-values.yaml

      - name: Helm upgrade --install
        run: |
          ssh ${{ env.MASTER_USER }}@${{ env.MASTER_IP }} \
            helm upgrade --install ${{ env.APP_NAME }} ${{ env.HELM_REMOTE_PATH }} \
              --kubeconfig ${{ env.KUBECONFIG_PATH }} \
              --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }} \
              --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
              -f ${{ env.HELM_REMOTE_PATH }}/secrets-values.yaml \
              -n ${{ env.NAMESPACE }} --create-namespace \
              --rollback-on-failure --timeout 5m

      - name: Verify rollout
        run: |
          ssh ${{ env.MASTER_USER }}@${{ env.MASTER_IP }} \
            kubectl --kubeconfig ${{ env.KUBECONFIG_PATH }} \
              rollout status deployment/${{ env.APP_NAME }} \
              -n ${{ env.NAMESPACE }} --timeout=5m
