name: Deploy Blog App to Kubernetes (On-Prem)

on:
  push:
    branches:
      - main

# ============================================================
# Yêu cầu: self-hosted runner cài trên máy local/VM
# vì K8s cluster dùng private IP 192.168.122.x
# GitHub cloud runner không reach được private network
#
# Cài runner: GitHub repo → Settings → Actions → Runners → New self-hosted runner
#
# Job 1: Build  → Build Docker image amd64, push Docker Hub
# Job 2: Deploy → Ansible SSH vào master, helm upgrade
# ============================================================

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: self-hosted

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & Push image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/blog-app
          TAG=${{ steps.meta.outputs.image_tag }}
          podman build --platform linux/amd64 -t $IMAGE:$TAG -t $IMAGE:latest .
          podman login docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          podman push $IMAGE:$TAG
          podman push $IMAGE:latest

  deploy:
    name: Deploy to K8s via Ansible
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Load secrets-values.yaml từ máy local
        run: cp $HOME/secrets/blog-secrets-values.yaml helm/blog-app/secrets-values.yaml

      - name: Install Ansible Collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Ansible helm upgrade blog-app
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_CONFIG: /dev/null
        run: |
          ansible-playbook ansible/playbooks/k8s-deploy.yml \
            -i ansible/inventory/k8s_hosts.ini \
            -e "image_tag=${{ needs.build-and-push.outputs.image_tag }}" \
            -e "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}"
