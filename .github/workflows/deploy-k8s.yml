name: Deploy Blog App to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & Push image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/blog-app
          TAG=${{ steps.meta.outputs.image_tag }}
          podman build --platform linux/amd64 -t $IMAGE:$TAG -t $IMAGE:latest .
          podman login docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          podman push $IMAGE:$TAG
          podman push $IMAGE:latest

  deploy:
    name: Deploy to K8s
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy helm chart + secrets lên master
        run: |
          ssh nguyenhieu@192.168.122.111 "mkdir -p /tmp/helm/blog-app"
          rsync -az helm/blog-app/ nguyenhieu@192.168.122.111:/tmp/helm/blog-app/
          rsync -az $HOME/secrets/blog-secrets-values.yaml nguyenhieu@192.168.122.111:/tmp/helm/blog-app/secrets-values.yaml

      - name: Helm upgrade --install
        run: |
          ssh nguyenhieu@192.168.122.111 "
            KUBECONFIG=/home/devops/.kube/config \
            helm upgrade --install blog-app /tmp/helm/blog-app \
              --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/blog-app \
              --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
              -f /tmp/helm/blog-app/secrets-values.yaml \
              -n blog --create-namespace \
              --atomic --timeout 5m
          "

      - name: Verify rollout
        run: |
          ssh nguyenhieu@192.168.122.111 "
            KUBECONFIG=/home/devops/.kube/config \
            kubectl rollout status deployment/blog-app -n blog --timeout=5m
          "
