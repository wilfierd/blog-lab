name: Apply K8s Infra (Postgres + MinIO)

on:
  workflow_dispatch:

env:
  MASTER_USER: nguyenhieu
  MASTER_IP: 192.168.122.111
  KUBECONFIG_PATH: /home/nguyenhieu/.kube/config
  NAMESPACE: blog
  K8S_REMOTE_PATH: /tmp/k8s

jobs:
  apply-infra:
    name: Apply Infra Manifests
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy k8s manifests lên master
        run: |
          ssh ${{ env.MASTER_USER }}@${{ env.MASTER_IP }} "mkdir -p ${{ env.K8S_REMOTE_PATH }}"
          rsync -az k8s/ ${{ env.MASTER_USER }}@${{ env.MASTER_IP }}:${{ env.K8S_REMOTE_PATH }}/

      - name: Apply namespace + policies + stateful services
        run: |
          ssh ${{ env.MASTER_USER }}@${{ env.MASTER_IP }} bash << 'EOF'
            export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
            kubectl apply -f ${{ env.K8S_REMOTE_PATH }}/namespace.yaml
            kubectl apply -f ${{ env.K8S_REMOTE_PATH }}/namespace-policies/ -R
            kubectl apply -f ${{ env.K8S_REMOTE_PATH }}/data/ -R
          EOF

      - name: Wait for Postgres + MinIO
        run: |
          ssh ${{ env.MASTER_USER }}@${{ env.MASTER_IP }} bash << 'EOF'
            export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
            kubectl rollout status statefulset/postgres -n data --timeout=3m
            kubectl rollout status statefulset/minio -n data --timeout=3m
          EOF
