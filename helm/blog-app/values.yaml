image:
  repository: wilfierd34/blog-app
  tag: latest
  pullPolicy: Always

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

hpa:
  minReplicas: 2
  maxReplicas: 4
  cpuUtilization: 70

service:
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: blog.local    # thay bằng domain thật
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

config:
  dbHost: postgres.data.svc.cluster.local
  dbPort: "5432"
  dbName: blogdb
  dbUser: admins
  dbSSLMode: disable
  awsEndpointURL: http://minio.data.svc.cluster.local:9000
  awsBucketName: blog-uploads
  awsRegion: us-east-1              # MinIO không care về region
  googleRedirectURL: http://blog.local/auth/google/callback
  logLevel: INFO
  presignExpireSeconds: "120"
  uploadAllowedMime: "image/jpeg,image/png,image/gif,image/webp"
  uploadMaxSizeBytes: "104857600"

# Secrets - KHÔNG lưu giá trị thật ở đây
# Giá trị thật lưu trong secrets-values.yaml (gitignored)
# Khi deploy: helm upgrade ... -f helm/blog-app/secrets-values.yaml
secrets:
  dbPassword: ""
  sessionSecret: ""
  googleClientID: ""
  googleClientSecret: ""
  minioAccessKey: ""
  minioSecretKey: ""
