apiVersion: v1
kind: Service
metadata:
  name: {{ include "blog-app.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "blog-app.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "blog-app.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 8080
