<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Welcome</title>
  <style>
    :root {
      --bg: #f9fafb;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #e5e7eb;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--card-bg);
      padding: 3rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      border: 1px solid var(--border);
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-sizing: border-box;
    }
    .card h1 {
      margin: 0 0 0.5rem 0;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    .card p {
      margin: 0 0 2rem 0;
      color: var(--text-muted);
      font-size: 1rem;
    }
    
    /* Login Form Styles */
    .form-group {
      text-align: left;
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      box-sizing: border-box;
      background: #f9fafb;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      background: white;
    }
    .btn-submit {
      width: 100%;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .btn-black {
      background: #111827;
      color: #ffffff;
    }
    .btn-black:hover {
      background: #1f2937;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      background: #fef2f2;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #fecaca;
      display: none;
      text-align: left;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.75rem 0;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .divider:not(:empty)::before { margin-right: 1em; }
    .divider:not(:empty)::after { margin-left: 1em; }

    /* Google Button */
    a.btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.75rem 1.5rem;
      background: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      box-sizing: border-box;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    a.btn:hover {
      background: #f8fafc;
      border-color: #d1d5db;
    }
    a.btn:active {
      transform: scale(0.98);
    }
    .icon { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to Blog</h1>
    <p>Sign in to read and write stories.</p>
    
    <div id="error-msg" class="error-msg"></div>

    <a class="btn" href="/auth/google">
      <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>

    <div class="divider">OR</div>

    <button type="button" id="show-form-btn" class="btn-submit btn-black" onclick="showForm()">Log in using account</button>

    <form id="login-form" style="display: none;" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit btn-black" id="submit-btn">Sign In</button>
    </form>
  </div>

  <script>
    const API = "";

    // Auto redirect if already logged in
    fetch(`${API}/auth/me`, { credentials: "include" })
      .then(r => { if (r.ok) window.location.href = "blog.html"; });

    function showForm() {
      document.getElementById('show-form-btn').style.display = 'none';
      document.getElementById('login-form').style.display = 'block';
      
      // Delay focus slightly to ensure the browser paints the form first
      setTimeout(() => {
        document.getElementById('username').focus();
      }, 50);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("submit-btn");
      const errorMsg = document.getElementById("error-msg");
      
      if (!username || !password) return;

      btn.disabled = true;
      btn.textContent = "Signing in...";
      errorMsg.style.display = "none";

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
          credentials: "include"
        });

        if (res.ok) {
          window.location.href = "blog.html";
        } else {
          let txt = await res.text();
          try {
            const json = JSON.parse(txt);
            txt = json.error || txt;
          } catch(e) {}
          errorMsg.textContent = "Login failed: " + txt;
          errorMsg.style.display = "block";
        }
      } catch (err) {
        errorMsg.textContent = "Connection error. Ensure backend is running.";
        errorMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    }
  </script>
</body>
</html>
