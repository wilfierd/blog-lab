---
- name: Ensure releases directory exists
  file:
    path: "{{ app_dir }}/releases"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"
  become: yes

- name: Save versioned backup to releases/
  copy:
    src: "{{ app_dir }}/{{ app_name }}"
    dest: "{{ app_dir }}/releases/{{ app_name }}-{{ binary_version | default('unknown') }}"
    remote_src: yes
    mode: "0755"
  ignore_errors: yes

- name: Prune releases — keep last 5 versions
  shell: |
    ls -t {{ app_dir }}/releases/{{ app_name }}-* 2>/dev/null | tail -n +6 | xargs -r rm -f
  args:
    executable: /bin/bash
  become: yes
  ignore_errors: yes

- name: Backup current binary (legacy .backup for Ansible auto-rollback)
  copy:
    src: "{{ app_dir }}/{{ app_name }}"
    dest: "{{ app_dir }}/{{ app_name }}.backup"
    remote_src: yes
    mode: "0755"
  ignore_errors: yes

- name: Stop service
  systemd:
    name: "{{ service_name }}"
    state: stopped
  become: yes
  ignore_errors: yes

- name: Kill any remaining processes
  shell: pkill -f {{ app_name }} || true
  become: yes
  failed_when: false

- name: Download application binary from S3
  shell: >
    aws s3 cp s3://{{ bucket }}/{{ 'releases/' + app_name + '-' + binary_version if binary_version is defined and binary_version != '' else app_name }}
    {{ app_dir }}/{{ app_name }} --region {{ region }}
  args:
    executable: /bin/bash
  retries: 3
  delay: 10
  register: result
  until: result.rc == 0

- name: Download systemd service file from S3
  shell: >
    aws s3 cp s3://{{ bucket }}/{{ service_name }}
    /etc/systemd/system/{{ service_name }} --region {{ region }}
  args:
    executable: /bin/bash
  become: yes
  retries: 3
  delay: 10
  register: result
  until: result.rc == 0
  notify: reload systemd daemon

- name: Sync frontend assets from S3
  shell: >
    aws s3 sync s3://{{ bucket }}/frontend/
    {{ app_dir }}/frontend/ --region {{ region }} --delete
  args:
    executable: /bin/bash
  retries: 3
  delay: 10
  register: result
  until: result.rc == 0

- name: Set executable permission on binary
  file:
    path: "{{ app_dir }}/{{ app_name }}"
    mode: "0755"
    owner: ec2-user
    group: ec2-user

- name: Flush handlers (reload systemd before start)
  meta: flush_handlers

- name: Start service
  systemd:
    name: "{{ service_name }}"
    state: started
    enabled: yes
  become: yes
