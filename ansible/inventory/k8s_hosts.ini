# Ansible chỉ SSH vào master để chạy kubectl/helm
# K8s API tự điều phối workloads sang workers — không cần SSH vào workers
# Yêu cầu: nguyenhieu có ~/.kube/config trên master-1
#   Nếu chưa có: sudo cp /etc/kubernetes/admin.conf ~/.kube/config && sudo chown nguyenhieu ~/.kube/config
[k8s_master]
192.168.122.111 ansible_user=nguyenhieu ansible_connection=ssh ansible_ssh_private_key_file=~/.ssh/id_rsa

# Tham khảo cấu trúc cluster (không dùng trong playbooks)
[k8s_workers]
192.168.122.112
192.168.122.113

[k8s_cluster:children]
k8s_master
k8s_workers
