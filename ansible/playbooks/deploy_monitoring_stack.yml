---
# Deploy monitoring stack (Prometheus + Grafana + Loki + Alertmanager + CloudWatch)
# to the dedicated monitoring EC2 in the public subnet.
#
# Prerequisites:
#   - Monitoring EC2 must be running (provisioned by Terraform)
#
# Usage:
#   ansible-playbook playbooks/deploy_monitoring_stack.yml \
#     -e "grafana_password=$GRAFANA_PASSWORD" \
#     -e "aws_region=$AWS_REGION"

- name: Deploy monitoring stack to monitoring EC2
  hosts: tag_Name_blog_monitoring
  become: yes
  gather_facts: no

  pre_tasks:
    - name: Wait for SSM connection (up to 3 minutes)
      wait_for_connection:
        timeout: 180
        sleep: 10

  tasks:
    - name: Ensure monitoring directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"
      loop:
        - /opt/monitoring
        - /opt/monitoring/grafana/provisioning/datasources
        - /opt/monitoring/grafana/provisioning/dashboards

    - name: Generate prometheus.yml from template
      template:
        src: "../../monitoring-ec2/prometheus.yml.j2"
        dest: /opt/monitoring/prometheus.yml
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Generate alertmanager.yml from template
      template:
        src: "../../monitoring-ec2/alertmanager.yml.j2"
        dest: /opt/monitoring/alertmanager.yml
        owner: ec2-user
        group: ec2-user
        mode: "0600"

    - name: Copy monitoring config files
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: ec2-user
        group: ec2-user
        mode: "0644"
      loop:
        - { src: "../../monitoring-ec2/docker-compose.yml",                                          dest: "/opt/monitoring/docker-compose.yml" }
        - { src: "../../monitoring-ec2/prometheus-rules.yml",                                        dest: "/opt/monitoring/prometheus-rules.yml" }
        - { src: "../../monitoring-ec2/loki-config.yml",                                             dest: "/opt/monitoring/loki-config.yml" }
        - { src: "../../monitoring-ec2/cloudwatch-config.yml",                                       dest: "/opt/monitoring/cloudwatch-config.yml" }
        - { src: "../../monitoring-ec2/grafana/provisioning/datasources/datasources.yml",            dest: "/opt/monitoring/grafana/provisioning/datasources/datasources.yml" }
        - { src: "../../monitoring-ec2/grafana/provisioning/dashboards/dashboards.yml",              dest: "/opt/monitoring/grafana/provisioning/dashboards/dashboards.yml" }
        - { src: "../../monitoring-ec2/grafana/provisioning/dashboards/aws-rds.json",                dest: "/opt/monitoring/grafana/provisioning/dashboards/aws-rds.json" }
        - { src: "../../monitoring-ec2/grafana/provisioning/dashboards/aws-redis.json",              dest: "/opt/monitoring/grafana/provisioning/dashboards/aws-redis.json" }
        - { src: "../../monitoring-ec2/grafana/provisioning/dashboards/aws-ec2-alb.json",            dest: "/opt/monitoring/grafana/provisioning/dashboards/aws-ec2-alb.json" }
        - { src: "../../monitoring-ec2/grafana/provisioning/dashboards/aws-infra.json",              dest: "/opt/monitoring/grafana/provisioning/dashboards/aws-infra.json" }
        - { src: "../../monitoring-ec2/grafana/provisioning/dashboards/blog-app.json",               dest: "/opt/monitoring/grafana/provisioning/dashboards/blog-app.json" }

    - name: Write .env file for docker-compose
      copy:
        dest: /opt/monitoring/.env
        owner: root
        group: root
        mode: "0644"
        content: |
          AWS_REGION={{ aws_region | default('us-west-2') }}
          GRAFANA_PASSWORD={{ grafana_password }}

    - name: Pull latest images
      shell: cd /opt/monitoring && docker-compose pull
      args:
        executable: /bin/bash

    - name: Start monitoring stack
      shell: cd /opt/monitoring && docker-compose up -d --remove-orphans
      args:
        executable: /bin/bash

    - name: Force reload Prometheus config (hot-reload via lifecycle API)
      uri:
        url: "http://localhost:9090/-/reload"
        method: POST
        status_code: [200, 204]
      retries: 5
      delay: 5

    - name: Wait for Grafana to be healthy
      uri:
        url: "http://localhost:3000/api/health"
        status_code: 200
      register: grafana_health
      retries: 12
      delay: 10
      until: grafana_health.status == 200

    - name: Wait for Prometheus to be healthy
      uri:
        url: "http://localhost:9090/-/healthy"
        status_code: 200
      register: prometheus_health
      retries: 12
      delay: 10
      until: prometheus_health.status == 200
