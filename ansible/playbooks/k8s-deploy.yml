---
- hosts: k8s_master
  gather_facts: false
  vars:
    namespace: blog
    repo_root: "{{ playbook_dir }}/../.."
    chart_local_path: "{{ playbook_dir }}/../../helm/blog-app"
    kubeconfig: /home/devops/.kube/config

  tasks:
    # ── Infra manifests ────────────────────────────────────────────────────
    - name: Tạo thư mục k8s trên master
      file:
        path: /tmp/k8s
        state: directory
        mode: '0755'

    - name: Copy k8s manifests lên master
      synchronize:
        src: "{{ repo_root }}/k8s/"
        dest: /tmp/k8s/
        delete: true

    - name: Apply namespace
      command: kubectl apply -f /tmp/k8s/namespace.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Apply stateful services
      command: kubectl apply -f /tmp/k8s/{{ item }} -R
      loop:
        - postgres/
        - minio/
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Rollout restart stateful services
      command: kubectl rollout restart statefulset/{{ item }} -n {{ namespace }}
      loop:
        - postgres
        - minio
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      ignore_errors: true

    # ── Chờ infra sẵn sàng ────────────────────────────────────────────────
    - name: Chờ PostgreSQL ready
      command: kubectl rollout status statefulset/postgres -n {{ namespace }} --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Chờ MinIO ready
      command: kubectl rollout status statefulset/minio -n {{ namespace }} --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    # ── Deploy app ─────────────────────────────────────────────────────────
    - name: Tạo thư mục helm trên master
      file:
        path: /tmp/helm/blog-app
        state: directory
        mode: '0755'

    - name: Copy Helm chart lên master
      synchronize:
        src: "{{ chart_local_path }}/"
        dest: /tmp/helm/blog-app/
        delete: true

    - name: Xóa helm lock secrets nếu đang stuck
      shell: |
        for status in pending-install pending-upgrade pending-rollback; do
          kubectl get secrets -n {{ namespace }} \
            -l "owner=helm,status=${status}" \
            -o name --kubeconfig {{ kubeconfig }} | \
            xargs -r kubectl delete -n {{ namespace }} --kubeconfig {{ kubeconfig }}
        done
      ignore_errors: true

    - name: Helm upgrade --install blog-app
      command: >
        helm upgrade --install blog-app /tmp/helm/blog-app
        --set image.repository={{ dockerhub_username }}/blog-app
        --set image.tag={{ image_tag }}
        -f /tmp/helm/blog-app/secrets-values.yaml
        -n {{ namespace }} --create-namespace
        --wait --timeout 5m
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: helm_result

    - name: Health check
      uri:
        url: "http://{{ inventory_hostname }}/api/health"
        status_code: 200
      delegate_to: localhost
      retries: 5
      delay: 10
      ignore_errors: true
      register: health_result

    - name: Rollback nếu health check thất bại
      command: helm rollback blog-app -n {{ namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: health_result.failed is defined and health_result.failed

    - name: Thông báo kết quả
      debug:
        msg: >
          Deploy {{ image_tag }} {{ 'THÀNH CÔNG' if not health_result.failed else 'THẤT BẠI → đã rollback' }}
