---
- hosts: k8s_master
  gather_facts: false
  vars:
    namespace: blog
    repo_root: "{{ playbook_dir }}/../.."
    chart_local_path: "{{ playbook_dir }}/../../helm/blog-app"

  tasks:
    # ── Infra (idempotent) ─────────────────────────────────────────────────
    - name: Tạo thư mục k8s trên master
      file:
        path: /tmp/k8s
        state: directory
        mode: '0755'

    - name: Copy k8s manifests lên master
      synchronize:
        src: "{{ repo_root }}/k8s/"
        dest: /tmp/k8s/
        delete: true

    - name: Apply namespace + stateful services
      command: kubectl apply -f /tmp/k8s/{{ item }} -R
      loop:
        - namespace.yaml
        - postgres/
        - redis/
        - minio/
      environment:
        KUBECONFIG: /home/devops/.kube/config

    # ── App ────────────────────────────────────────────────────────────────
    - name: Tạo thư mục helm trên master
      file:
        path: /tmp/helm/blog-app
        state: directory
        mode: '0755'

    - name: Copy Helm chart lên master
      synchronize:
        src: "{{ chart_local_path }}/"
        dest: /tmp/helm/blog-app/
        delete: true

    - name: Helm upgrade --install blog-app
      command: >
        helm upgrade --install blog-app /tmp/helm/blog-app
        --set image.repository={{ dockerhub_username }}/blog-app
        --set image.tag={{ image_tag }}
        -f /tmp/helm/blog-app/secrets-values.yaml
        -n {{ namespace }} --create-namespace
        --wait --timeout 5m
      environment:
        KUBECONFIG: /home/devops/.kube/config
      register: helm_result

    - name: Kiểm tra rollout status
      command: kubectl rollout status deployment/blog-app -n {{ namespace }} --timeout=300s
      environment:
        KUBECONFIG: /home/devops/.kube/config

    - name: Health check
      uri:
        url: "http://{{ inventory_hostname }}/api/health"
        status_code: 200
      delegate_to: localhost
      retries: 5
      delay: 5
      ignore_errors: true
      register: health_result

    - name: Rollback nếu health check thất bại
      command: helm rollback blog-app -n {{ namespace }}
      environment:
        KUBECONFIG: /home/devops/.kube/config
      when: health_result.failed is defined and health_result.failed

    - name: Thông báo kết quả
      debug:
        msg: >
          Deploy {{ image_tag }} {{ 'THÀNH CÔNG' if not health_result.failed else 'THẤT BẠI → đã rollback' }}
