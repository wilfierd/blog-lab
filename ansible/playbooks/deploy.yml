---
- name: Deploy Blog App — Rolling Update (SSM, zero-downtime)
  hosts: tag_Name_blog_app_asg_instance
  serial: 1
  max_fail_percentage: 49  # cho phép fail tối đa ~1 instance, miễn còn >50% healthy
  gather_facts: no

  pre_tasks:
    - name: Wait for SSM connection (up to 3 minutes)
      wait_for_connection:
        timeout: 180
        sleep: 10

  roles:
    - blog_deploy
